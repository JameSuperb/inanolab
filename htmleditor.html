  <style>
    * { box-sizing: border-box; }
    
    .editor-container {
      display: flex;
      position: relative;
    }
    
    .line-numbers {
      font-family: 'JetBrains Mono', monospace;
      background: #252538;
      color: #64748b;
      padding: 1rem 0.75rem;
      text-align: right;
      user-select: none;
      font-size: 14px;
      line-height: 1.6;
      overflow: hidden;
      border-right: 1px solid rgba(99, 102, 241, 0.1);
      min-width: 50px;
      display: flex;
      flex-direction: column;
    }
    
    .line-numbers div {
      height: 1.6em;
      display: flex;
      align-items: center;
      justify-content: flex-end;
    }
    
    .editor-textarea {
      font-family: 'JetBrains Mono', monospace;
      tab-size: 2;
      line-height: 1.6;
      resize: none;
      flex: 1;
    }
    
    .editor-textarea:focus {
      outline: none;
    }
    
    .preview-frame {
      border: none;
      background: white;
    }
    
    .toolbar-btn {
      transition: all 0.15s ease;
    }
    
    .toolbar-btn:hover {
      transform: translateY(-1px);
    }
    
    .toolbar-btn:active {
      transform: translateY(0);
    }
    
    .toolbar-btn.disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    
    .toolbar-btn.disabled:hover {
      transform: none;
    }

    .secondary-toolbar {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      align-items: center;
      padding: 0.75rem 0;
    }

    .toolbar-group {
      display: flex;
      gap: 0.5rem;
      align-items: center;
    }

    .toolbar-divider {
      width: 1px;
      height: 24px;
      background: rgba(99, 102, 241, 0.2);
    }

    .toolbar-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #64748b;
      font-weight: 600;
      margin-left: 0.5rem;
    }

    .secondary-toolbar {
      max-height: 70px;
      overflow-y: auto;
      overflow-x: hidden;
      transition: max-height 0.3s ease, opacity 0.3s ease;
      padding-right: 0.5rem;
    }

    .secondary-toolbar::-webkit-scrollbar {
      width: 6px;
    }

    .secondary-toolbar::-webkit-scrollbar-track {
      background: rgba(99, 102, 241, 0.05);
      border-radius: 3px;
    }

    .secondary-toolbar::-webkit-scrollbar-thumb {
      background: rgba(99, 102, 241, 0.3);
      border-radius: 3px;
    }

    .secondary-toolbar::-webkit-scrollbar-thumb:hover {
      background: rgba(99, 102, 241, 0.5);
    }

    .secondary-toolbar.collapsed {
      max-height: 0;
      opacity: 0;
    }

    .compact-toggle {
      transition: transform 0.3s ease;
    }

    .compact-toggle.collapsed {
      transform: rotate(180deg);
    }
    
    .panel-header {
      font-family: 'Space Grotesk', sans-serif;
    }
    
    .sync-indicator {
      animation: pulse 2s infinite;
    }
    
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    
    .glow-border {
      box-shadow: 0 0 0 1px rgba(99, 102, 241, 0.1), 0 4px 20px rgba(0, 0, 0, 0.08);
    }
    
    .resizer {
      height: 4px;
      background: rgba(99, 102, 241, 0.2);
      cursor: row-resize;
      transition: background 0.2s ease;
      flex-shrink: 0;
    }
    
    .resizer:hover {
      background: rgba(99, 102, 241, 0.5);
    }
    
    .modal-backdrop {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.7);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }
    
    .modal {
      background: #1e293b;
      border: 1px solid rgba(99, 102, 241, 0.3);
      border-radius: 12px;
      padding: 2rem;
      max-width: 600px;
      max-height: 80vh;
      overflow-y: auto;
      color: #f1f5f9;
    }
    
    .modal h2 {
      margin-top: 0;
      color: #6366f1;
      font-family: 'Space Grotesk', sans-serif;
    }
    
    .modal-close {
      position: absolute;
      top: 1rem;
      right: 1rem;
      background: none;
      border: none;
      color: #94a3b8;
      cursor: pointer;
      font-size: 24px;
      padding: 0;
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 6px;
      transition: all 0.2s ease;
    }
    
    .modal-close:hover {
      background: rgba(99, 102, 241, 0.1);
      color: #f1f5f9;
    }
    
    .shortcuts-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
      margin: 1rem 0;
    }
    
    .shortcut-item {
      display: flex;
      gap: 0.5rem;
      padding: 0.75rem;
      background: rgba(99, 102, 241, 0.1);
      border-radius: 6px;
      border: 1px solid rgba(99, 102, 241, 0.2);
    }
    
    .shortcut-key {
      font-family: 'JetBrains Mono', monospace;
      background: rgba(99, 102, 241, 0.3);
      padding: 0.25rem 0.5rem;
      border-radius: 4px;
      font-size: 12px;
      white-space: nowrap;
      color: #6366f1;
      font-weight: 600;
    }
    
    .shortcut-desc {
      font-size: 13px;
      color: #cbd5e1;
    }
    
    .toast {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      background: rgba(16, 185, 129, 0.9);
      color: white;
      padding: 1rem 1.5rem;
      border-radius: 8px;
      font-size: 14px;
      z-index: 999;
      animation: slideIn 0.3s ease;
    }
    
    @keyframes slideIn {
      from {
        transform: translateX(400px);
        opacity: 0;
      }
      to {
        transform: translateX(0);
        opacity: 1;
      }
    }
    
    .syntax-highlight {
      color: #94a3b8;
    }
    
    .syntax-tag {
      color: #f472b6;
    }
    
    .syntax-attr {
      color: #fbbf24;
    }
    
    .syntax-value {
      color: #86efac;
    }

    #preview ol {
      list-style-type: decimal;
      margin-left: 1.5rem;
    }

    #preview ol li {
      margin-bottom: 0.5rem;
    }

    #preview ul {
      list-style-type: disc;
      margin-left: 1.5rem;
    }

    #preview ul li {
      margin-bottom: 0.5rem;
    }
  </style>
  <style>body { box-sizing: border-box; }</style>

  <script>
    const defaultConfig = {
      app_title: 'HTML Editor',
      primary_color: '#6366f1',
      secondary_color: '#1e293b',
      text_color: '#f1f5f9',
      accent_color: '#10b981',
      font_family: 'Space Grotesk',
      font_size: 16
    };

    let config = { ...defaultConfig };
    let isUpdatingFromEditor = false;
    let isUpdatingFromPreview = false;
    let debounceTimer = null;
    let undoStack = [];
    let redoStack = [];
    let currentTheme = 'dark';

    const editor = document.getElementById('editor');
    const preview = document.getElementById('preview');
    const charCount = document.getElementById('char-count');
    const lineCount = document.getElementById('line-count');
    const lineNumbers = document.getElementById('line-numbers');
    const resizer = document.getElementById('resizer');
    const app = document.getElementById('app');
    const secondaryToolbar = document.getElementById('secondary-toolbar');

    // Initial sample content
    const sampleHTML = `<h1 style="color: #6366f1; font-family: sans-serif;">Welcome to HTML Editor</h1>
<p style="color: #475569; font-size: 16px; line-height: 1.6;">
  Start typing in the editor or edit this preview directly!
</p>
<ul style="color: #64748b;">
  <li>✨ Real-time preview</li>
  <li>🔄 Bi-directional sync</li>
  <li>🎨 Quick tag insertion</li>
</ul>
<button style="background: #6366f1; color: white; padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer;">

</button>`;

    // Initialize editor with sample
    editor.value = sampleHTML;

    // Editor to Preview sync
    editor.addEventListener('input', () => {

    // Preview to Editor sync
    preview.addEventListener('input', () => {
      if (isUpdatingFromEditor) return;
      isUpdatingFromPreview = true;
      
      clearTimeout(debounceTimer);

        updateEditor();
        updateStats();
        saveToStorage();
        isUpdatingFromPreview = false;
      }, 100);

    // Update line numbers on scroll
    editor.addEventListener('scroll', () => {
      lineNumbers.scrollTop = editor.scrollTop;

    function updateLineNumbers() {
      const lines = editor.value.split('\n').length;
      let lineNumbersHTML = '';
      for (let i = 1; i <= lines; i++) {
        lineNumbersHTML += `<div>${i}</div>`;
      }
      lineNumbers.innerHTML = lineNumbersHTML;
    }

    function updatePreview() {
      preview.innerHTML = editor.value;
      updateLineNumbers();
    }

    function updateEditor() {
      editor.value = preview.innerHTML;
      updateLineNumbers();
    }

    function updateStats() {
      const text = editor.value;
      charCount.textContent = text.length;
      lineCount.textContent = text.split('\n').length;
    }

    // Undo/Redo stack management
    function pushToUndoStack() {
      undoStack.push(editor.value);
      if (undoStack.length > 50) undoStack.shift();
      redoStack = [];
      updateUndoRedoButtons();
    }

    function toggleSecondaryToolbar() {
      const toggleBtn = document.getElementById('toggle-btn');
      const toggleText = document.getElementById('toggle-text');
      const toggleIcon = document.getElementById('toggle-icon');
      secondaryToolbar.classList.toggle('collapsed');
      
      // Update text and icon
      if (secondaryToolbar.classList.contains('collapsed')) {
        toggleText.textContent = 'Show Tools';
        toggleIcon.style.transform = 'rotate(180deg)';
      } else {
        toggleText.textContent = 'Hide Tools';
        toggleIcon.style.transform = 'rotate(0deg)';
      }
      
      localStorage.setItem('toolbarState', secondaryToolbar.classList.contains('collapsed') ? 'collapsed' : 'expanded');
    }

    // Restore toolbar state
    function restoreToolbarState() {
      const state = localStorage.getItem('toolbarState');
      const toggleText = document.getElementById('toggle-text');
      const toggleIcon = document.getElementById('toggle-icon');
      if (state === 'collapsed') {
        secondaryToolbar.classList.add('collapsed');
        toggleText.textContent = 'Show Tools';
        toggleIcon.style.transform = 'rotate(180deg)';

    restoreToolbarState();

    function undoAction() {
      if (undoStack.length === 0) return;
      redoStack.push(editor.value);

      updateUndoRedoButtons();
      saveToStorage();
    }

    function redoAction() {
      if (redoStack.length === 0) return;
      undoStack.push(editor.value);
      editor.value = redoStack.pop();
      updatePreview();
      updateStats();
      updateUndoRedoButtons();
      saveToStorage();
    }

    function updateUndoRedoButtons() {
      const undoBtn = document.querySelector('button[onclick="undoAction()"]');
      const redoBtn = document.querySelector('button[onclick="redoAction()"]');
      if (undoBtn) undoBtn.classList.toggle('disabled', undoStack.length === 0);
      if (redoBtn) redoBtn.classList.toggle('disabled', redoStack.length === 0);

    // Snippet insertion with undo
    function insertSnippet(tag) {
      pushToUndoStack();
      const snippets = {
        'div': '<div></div>',
        'p': '<p></p>',
        'h1': '<h1></h1>',
        'h2': '<h2></h2>',
        'h3': '<h3></h3>',
        'h4': '<h4></h4>',
        'h5': '<h5></h5>',
        'h6': '<h6></h6>',
        'a': '<a href="#"></a>',
        'img': '<img src="" alt="" />',
        'ul': '<ul>\n  <li></li>\n  <li></li>\n</ul>',
        'ol': '<ol>\n  <li></li>\n  <li></li>\n</ol>',
        'br': '<br/>',
        'span': '<span></span>',
        'section': '<section></section>',
        'article': '<article></article>',
        'header': '<header></header>',
        'footer': '<footer></footer>',
        'nav': '<nav></nav>',
        'strong': '<strong></strong>',
        'em': '<em></em>',
        'u': '<u></u>',
        'code': '<code></code>',
        'blockquote': '<blockquote></blockquote>',
        'table': '<table>\n  <tr>\n    <th></th>\n    <th></th>\n  </tr>\n  <tr>\n    <td></td>\n    <td></td>\n  </tr>\n</table>'
      };
      
      const start = editor.selectionStart;
      const end = editor.selectionEnd;
      const text = editor.value;
      const snippet = snippets[tag] || `<${tag}></${tag}>`;
      
      editor.value = text.substring(0, start) + snippet + text.substring(end);
      editor.focus();
      
      const cursorPos = start + snippet.indexOf('>') + 1;
      editor.setSelectionRange(cursorPos, cursorPos);
      
      updatePreview();
      updateStats();
      saveToStorage();
    }

    // Format code
    function formatCode() {
      pushToUndoStack();
      let html = editor.value;
      let formatted = '';
      let indent = 0;
      
      html = html.replace(/>\s*</g, '>\n<');
      const lines = html.split('\n');
      
      lines.forEach(line => {
        line = line.trim();
        if (!line) return;
        
        if (line.match(/^<\/\w/)) indent--;
        formatted += '  '.repeat(Math.max(0, indent)) + line + '\n';
        if (line.match(/^<\w[^>]*[^\/]>.*$/) && !line.match(/<.*>.*<\/.*>/)) indent++;
      });
      
      editor.value = formatted.trim();
      updatePreview();
      updateStats();
      saveToStorage();
      showToast('Code formatted!');
    }

    // Minify code
    function minifyCode() {
      pushToUndoStack();
      let html = editor.value;
      // Remove comments
      html = html.replace(/<!--[\s\S]*?-->/g, '');
      // Remove unnecessary whitespace
      html = html.replace(/>\s+</g, '><');
      html = html.replace(/\s+/g, ' ');
      html = html.trim();
      
      editor.value = html;
      updatePreview();
      updateStats();
      saveToStorage();
      showToast('Code minified!');
    }

    // Remove line breaks
    function removeLineBreaks() {
      pushToUndoStack();
      let html = editor.value;

      updatePreview();
      updateStats();
      saveToStorage();
      showToast('Line breaks removed!');
    }

    // Validate HTML
    function validateHTML() {
      const html = editor.value;
      let issues = [];
      
      // Check for unclosed tags
      const openTags = (html.match(/<([a-z][a-z0-9]*)[^>]*[^/]>/gi) || []).map(tag => 
        tag.match(/<([a-z][a-z0-9]*)/i)[1].toLowerCase()
      );
      const closeTags = (html.match(/<\/([a-z][a-z0-9]*)>/gi) || []).map(tag =>
        tag.match(/<\/([a-z][a-z0-9]*)/i)[1].toLowerCase()
      );
      
      const selfClosing = ['img', 'br', 'hr', 'input', 'meta', 'link'];
      const openTagCount = openTags.filter(t => !selfClosing.includes(t)).length;
      const closeTagCount = closeTags.length;
      
      if (openTagCount > closeTagCount) {
        issues.push(`⚠️ ${openTagCount - closeTagCount} unclosed tag(s) detected`);
      } else if (closeTagCount > openTagCount) {
        issues.push(`⚠️ ${closeTagCount - openTagCount} extra closing tag(s) detected`);
      }
      
      // Check for improper nesting
      if (!/<[^>]+>[^<]*<\/[^>]+>/.test(html) && html.includes('<')) {
        if (!/^<[^>]+>/.test(html.trim())) {
          issues.push('ℹ️ HTML should start with a tag');
        }
      }
      
      if (issues.length === 0) {
        showModal('✅ HTML Validation', '<p style="color: #10b981;">Your HTML looks valid! No issues detected.</p>');
      } else {
        showModal('⚠️ HTML Validation Issues', '<ul style="color: #fbbf24; list-style: none; padding: 0;">' + 
          issues.map(i => `<li style="padding: 0.5rem 0;">${i}</li>`).join('') + '</ul>');
      }
    }
