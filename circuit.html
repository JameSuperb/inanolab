* { box-sizing: border-box; }
html, body { height: 100%; margin: 0; overflow: hidden; font-family: 'IBM Plex Sans', sans-serif; }
.mono { font-family: 'JetBrains Mono', monospace; }
.canvas-grid {
  background-image: 
    linear-gradient(rgba(0,0,0,0.05) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,0,0,0.05) 1px, transparent 1px);
  background-size: 20px 20px;
}
.component-item { cursor: grab; user-select: none; }
.component-item:active { cursor: grabbing; }
.terminal { cursor: crosshair; }
.terminal:hover .terminal-dot { fill: #e53e3e; }
.selected-component { outline: 2px dashed #3182ce; outline-offset: 4px; }
.wire-path { stroke: #000; stroke-width: 2; fill: none; cursor: pointer; }
.wire-path:hover { stroke: #3182ce; stroke-width: 3; }
.wire-preview { stroke: #2563eb; stroke-width: 2; fill: none; stroke-dasharray: 6 4; pointer-events: none; }
.junction-dot { fill: #000; }
.toolbar-btn { transition: all 0.15s; }
.toolbar-btn:hover { background: #e2e8f0; }
.toolbar-btn.active { background: #1a202c; color: white; }
.ghost-component { opacity: 0.5; pointer-events: none; position: absolute; z-index: 1000; }
.prop-input { font-family: 'JetBrains Mono', monospace; }
#canvas-svg { cursor: default; }
#canvas-svg.mode-wire { cursor: crosshair; }
#canvas-svg.mode-select { cursor: default; }
.toast { animation: slideIn 0.3s ease; }
@keyframes slideIn { from { transform: translateY(-20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
</style>

  <script>
// ============ STATE ============
let components = [];
let wires = [];
let selectedId = null;
let mode = 'select'; // select, wire
let wireStart = null; // {compId, terminalIdx, x, y}
let wireCursor = null; // {x, y}
let nextIds = {};
let undoStack = [];
let redoStack = [];
let dragData = null;
const camera = {
  x: 0,
  y: 0,
  zoom: 1,
  minZoom: 0.35,
  maxZoom: 3,
  viewWidth: null,
  viewHeight: null
};
const GRID = 20;
const COMP_W = 80;
const COMP_H = 40;

function snap(v) { return Math.round(v / GRID) * GRID; }

// ============ COMPONENT DEFINITIONS ============
const compDefs = {
  resistor: { label: 'R', defaultValue: '10 Ω', terminals: [{dx:-40,dy:0},{dx:40,dy:0}] },
  capacitor: { label: 'C', defaultValue: '100 µF', terminals: [{dx:-40,dy:0},{dx:40,dy:0}] },
  polarized_capacitor: { label: 'C', defaultValue: '100 µF', terminals: [{dx:-40,dy:0},{dx:40,dy:0}] },
  inductor: { label: 'L', defaultValue: '10 mH', terminals: [{dx:-40,dy:0},{dx:40,dy:0}] },
  dc_supply: { label: 'V', defaultValue: '5 V', terminals: [{dx:-40,dy:0},{dx:40,dy:0}] },
  ac_supply: { label: 'V', defaultValue: '220 V', terminals: [{dx:-40,dy:0},{dx:40,dy:0}] },
  ammeter: { label: 'A', defaultValue: '', terminals: [{dx:-40,dy:0},{dx:40,dy:0}] },
  voltmeter: { label: 'V', defaultValue: '', terminals: [{dx:-40,dy:0},{dx:40,dy:0}] },
  ground: { label: 'GND', defaultValue: '', terminals: [{dx:0,dy:-20}] },
  switch: { label: 'S', defaultValue: '', terminals: [{dx:-40,dy:0},{dx:40,dy:0}] },
  bulb: { label: 'X', defaultValue: '', terminals: [{dx:-40,dy:0},{dx:40,dy:0}] },
  diode: { label: 'D', defaultValue: '', terminals: [{dx:-40,dy:0},{dx:40,dy:0}] },
  led: { label: 'LED', defaultValue: '', terminals: [{dx:-40,dy:0},{dx:40,dy:0}] },
  // NPN terminals are ordered as Base, Collector, Emitter.
  npn_transistor: { label: 'Q', defaultValue: '', terminals: [{dx:-40,dy:0},{dx:0,dy:-40},{dx:0,dy:40}] },
  // PNP terminals are ordered as Base, Emitter, Collector.
  pnp_transistor: { label: 'Q', defaultValue: '', terminals: [{dx:-40,dy:0},{dx:0,dy:-40},{dx:0,dy:40}] },
  transistor: { label: 'Q', defaultValue: '', terminals: [{dx:-40,dy:4},{dx:-40,dy:-4},{dx:40,dy:0}] },
  junction: { label: 'J', defaultValue: '', terminals: [{dx:0,dy:0}] }
};

function getNextLabel(type) {
  const def = compDefs[type];
  if (!nextIds[type]) nextIds[type] = 1;
  return def.label + (nextIds[type]++);
}

// ============ UNDO/REDO ============
function saveState() {
  undoStack.push(JSON.stringify({ components, wires }));
  if (undoStack.length > 50) undoStack.shift();
  redoStack = [];
}
function undoAction() {
  if (!undoStack.length) return;
  redoStack.push(JSON.stringify({ components, wires }));
  const state = JSON.parse(undoStack.pop());
  components = state.components; wires = state.wires;
  selectedId = null; render();
}
function redoAction() {
  if (!redoStack.length) return;
  undoStack.push(JSON.stringify({ components, wires }));
  const state = JSON.parse(redoStack.pop());
  components = state.components; wires = state.wires;
  selectedId = null; render();
}

// ============ MODE ============
function setMode(m) {
  mode = m;
  wireStart = null;
  wireCursor = null;
  const selectBtn = document.getElementById('btn-select');
  const wireBtn = document.getElementById('btn-wire');
  if (selectBtn) selectBtn.classList.toggle('active', m === 'select');
  if (wireBtn) wireBtn.classList.toggle('active', m === 'wire');
  const svg = document.getElementById('canvas-svg');
  svg.className.baseVal = 'w-full h-full mode-' + m;
  render();
}

function syncZoomUI() {
  const slider = document.getElementById('zoom-slider');
  const label = document.getElementById('zoom-value');
  const percent = Math.round(camera.zoom * 100);
  if (slider) slider.value = String(percent);
  if (label) label.textContent = `${percent}%`;
}

function setCameraZoom(nextZoom, anchorClientX = null, anchorClientY = null) {
  const rect = svg.getBoundingClientRect();
  if (!rect.width || !rect.height || !camera.viewWidth || !camera.viewHeight) return;

  const clampedZoom = Math.max(camera.minZoom, Math.min(camera.maxZoom, nextZoom));
  if (clampedZoom === camera.zoom) {
    syncZoomUI();
    return;
  }

  const pointerX = anchorClientX == null ? rect.width / 2 : anchorClientX - rect.left;
  const pointerY = anchorClientY == null ? rect.height / 2 : anchorClientY - rect.top;
  const worldX = camera.x + (pointerX / rect.width) * camera.viewWidth;
  const worldY = camera.y + (pointerY / rect.height) * camera.viewHeight;

  camera.zoom = clampedZoom;
  const nextWidth = rect.width / camera.zoom;
  const nextHeight = rect.height / camera.zoom;
  camera.x = worldX - (pointerX / rect.width) * nextWidth;
  camera.y = worldY - (pointerY / rect.height) * nextHeight;
  camera.viewWidth = nextWidth;
  camera.viewHeight = nextHeight;
  svg.setAttribute('viewBox', `${camera.x} ${camera.y} ${camera.viewWidth} ${camera.viewHeight}`);
  syncZoomUI();
}

function setZoomFromSlider(value) {
  const parsed = parseInt(value, 10);
  if (Number.isNaN(parsed)) return;
  setCameraZoom(parsed / 100);
}

function panCanvas(direction) {
  if (!camera.viewWidth || !camera.viewHeight) return;
  const step = 100 / camera.zoom;
  if (direction === 'up') camera.y -= step;
  if (direction === 'down') camera.y += step;
  if (direction === 'left') camera.x -= step;
  if (direction === 'right') camera.x += step;
  svg.setAttribute('viewBox', `${camera.x} ${camera.y} ${camera.viewWidth} ${camera.viewHeight}`);
}

function findNearestTerminal(x, y, maxDistance = 16) {
  let best = null;
  components.forEach((comp) => {
    const terms = getTerminalPositions(comp);
    terms.forEach((t, idx) => {
      const dx = t.x - x;
      const dy = t.y - y;
      const dist = Math.hypot(dx, dy);
      if (!best || dist < best.distance) {
        best = { compId: comp.id, termIdx: idx, x: t.x, y: t.y, distance: dist };
      }
    });
  });
  if (best && best.distance <= maxDistance) return best;
  return null;
}

function getTerminalFromPointer(e, pt) {
  const termEl = e.target.closest('.terminal');
  if (termEl) {
    const compId = termEl.dataset.compId;
    const termIdx = parseInt(termEl.dataset.termIdx);
    const comp = components.find(c => c.id === compId);
    if (!comp) return null;
    const terms = getTerminalPositions(comp);
    const term = terms[termIdx];
    if (!term) return null;
    return { compId, termIdx, x: term.x, y: term.y };
  }
  return findNearestTerminal(pt.x, pt.y, 18);
}

// ============ RENDERING ============
function getTerminalPositions(comp) {
  const def = compDefs[comp.type];
  const rad = (comp.rotation || 0) * Math.PI / 180;
  return def.terminals.map(t => {
    const rx = t.dx * Math.cos(rad) - t.dy * Math.sin(rad);
    const ry = t.dx * Math.sin(rad) + t.dy * Math.cos(rad);
    return { x: comp.x + rx, y: comp.y + ry };
  });
}

function getLabelPosition(comp) {
  // Dynamic label positioning based on rotation to avoid overlap
  const rot = comp.rotation || 0;
  const offset = 28;
  
  let labelX = comp.x;
  let labelY = comp.y - offset; // default: above
  let rotation = 0;
  
  if (rot === 90) {
    labelX = comp.x + offset; // right side when vertical
    labelY = comp.y;
    rotation = -90;
  } else if (rot === 180) {
    labelX = comp.x;
    labelY = comp.y + offset; // below
    rotation = 0;
  } else if (rot === 270) {
    labelX = comp.x - offset; // left side when vertical
    labelY = comp.y;
    rotation = 90;
  }
  
  return { labelX, labelY, rotation };
}

function render() {
  const wiresLayer = document.getElementById('wires-layer');
  const previewLayer = document.getElementById('preview-layer');
  const compsLayer = document.getElementById('components-layer');
  const termsLayer = document.getElementById('terminals-layer');
  
  // Wires
  let wHtml = '';
  wires.forEach((w, i) => {
    wHtml += `<path class="wire-path" d="M${w.x1},${w.y1} L${w.x2},${w.y2}" data-wire-idx="${i}"/>`;
  });
  
  // Junction dots where wires meet
  const junctions = findJunctions();
  junctions.forEach(j => {
    wHtml += `<circle class="junction-dot" cx="${j.x}" cy="${j.y}" r="4"/>`;
  });

  if (mode === 'select') {
    const connectedTerminals = findConnectedTerminals();
    connectedTerminals.forEach((terminal) => {
      wHtml += `<circle class="junction-dot" cx="${terminal.x}" cy="${terminal.y}" r="4"/>`;
    });
  }
  wiresLayer.innerHTML = wHtml;

  if (previewLayer) {
    if (mode === 'wire' && wireStart && wireCursor) {
      if (wireStart.x === wireCursor.x || wireStart.y === wireCursor.y) {
        previewLayer.innerHTML = `<path class="wire-preview" d="M${wireStart.x},${wireStart.y} L${wireCursor.x},${wireCursor.y}"/>`;
      } else {
        previewLayer.innerHTML = `<path class="wire-preview" d="M${wireStart.x},${wireStart.y} L${wireCursor.x},${wireStart.y} L${wireCursor.x},${wireCursor.y}"/>`;
      }
    } else {
      previewLayer.innerHTML = '';
    }
  }

  // Components
  let cHtml = '';
  components.forEach(comp => {
    const sel = comp.id === selectedId ? ' selected-component' : '';
    const rot = comp.rotation || 0;
    cHtml += `<g class="comp-group${sel}" data-comp-id="${comp.id}">`;
    // Transparent hit-area so clicks anywhere on the component body register
    cHtml += `<g transform="translate(${comp.x},${comp.y}) rotate(${rot})"><rect x="-44" y="-44" width="88" height="88" fill="transparent" stroke="none" style="pointer-events:all"/></g>`;
    cHtml += renderComponentSVG(comp);
    // Dynamic label positioning based on rotation
    const labelPos = getLabelPosition(comp);
    cHtml += `<g transform="translate(${labelPos.labelX},${labelPos.labelY}) rotate(${labelPos.rotation})">`;
    cHtml += `<text x="0" y="0" text-anchor="middle" dominant-baseline="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#333">${comp.name}</text>`;
    if (comp.value) {
      cHtml += `<text x="0" y="13" text-anchor="middle" dominant-baseline="middle" font-size="10" font-family="JetBrains Mono, monospace" fill="#666">${comp.value}</text>`;
    }
    cHtml += '</g>';
    cHtml += '</g>';
  });
  compsLayer.innerHTML = cHtml;

  // Terminals (shown in wire mode as red circles)
  let tHtml = '';
  components.forEach(comp => {
    const terms = getTerminalPositions(comp);
    terms.forEach((t, idx) => {
      tHtml += `<g class="terminal" data-comp-id="${comp.id}" data-term-idx="${idx}" style="${mode === 'wire' ? 'display:block;' : 'display:none;'}"><circle class="terminal-hit" cx="${t.x}" cy="${t.y}" r="14" fill="rgba(239,68,68,0.01)" stroke="none"/><circle class="terminal-dot" cx="${t.x}" cy="${t.y}" r="8" fill="#ef4444" stroke="#dc2626" stroke-width="2"/></g>`;
    });
  });
  termsLayer.innerHTML = tHtml;

  renderProperties();
}

function findJunctions() {
  const points = {};
  wires.forEach(w => {
    const k1 = `${w.x1},${w.y1}`; const k2 = `${w.x2},${w.y2}`;
    points[k1] = (points[k1] || 0) + 1;
    points[k2] = (points[k2] || 0) + 1;
  });
  return Object.entries(points).filter(([,c]) => c >= 3).map(([k]) => {
    const [x,y] = k.split(',').map(Number);
    return {x,y};
  });
}

function findConnectedTerminals() {
  const seen = new Set();
  const connected = [];

  components.forEach((comp) => {
    const terms = getTerminalPositions(comp);
    terms.forEach((term) => {
      const isConnected = wires.some((wire) => {
        const startMatches = Math.abs(wire.x1 - term.x) < 2 && Math.abs(wire.y1 - term.y) < 2;
        const endMatches = Math.abs(wire.x2 - term.x) < 2 && Math.abs(wire.y2 - term.y) < 2;
        return startMatches || endMatches;
      });

      if (!isConnected) return;

      const key = `${term.x},${term.y}`;
      if (seen.has(key)) return;

      seen.add(key);
      connected.push(term);
    });
  });

  return connected;
}

function autoRouteWire(x1, y1, x2, y2) {
  // Create L-shaped wire: horizontal first, then vertical
  wires.push({ x1, y1, x2: x2, y2: y1 });
  wires.push({ x1: x2, y1: y1, x2: x2, y2: y2 });
}

function updateProp(id, prop, val) {
  saveState();
  const comp = components.find(c => c.id === id);
  if (comp) { comp[prop] = val; render(); }
}

// ============ INTERACTION ============
const svg = document.getElementById('canvas-svg');
let dragging = null; let dragOffset = {x:0,y:0};

function updateCameraViewBox(preserveCenter = false) {
  const rect = svg.getBoundingClientRect();
  if (!rect.width || !rect.height) return;

  const nextWidth = rect.width / camera.zoom;
  const nextHeight = rect.height / camera.zoom;

  if (preserveCenter && camera.viewWidth && camera.viewHeight) {
    const cx = camera.x + camera.viewWidth / 2;
    const cy = camera.y + camera.viewHeight / 2;
    camera.x = cx - nextWidth / 2;
    camera.y = cy - nextHeight / 2;
  }

  camera.viewWidth = nextWidth;
  camera.viewHeight = nextHeight;
  svg.setAttribute('viewBox', `${camera.x} ${camera.y} ${camera.viewWidth} ${camera.viewHeight}`);
}

function getSVGPoint(e) {
  const rect = svg.getBoundingClientRect();
  if (!rect.width || !rect.height || !camera.viewWidth || !camera.viewHeight) {
    return { x: e.clientX - rect.left, y: e.clientY - rect.top };
  }

  const sx = (e.clientX - rect.left) / rect.width;
  const sy = (e.clientY - rect.top) / rect.height;
  return {
    x: camera.x + sx * camera.viewWidth,
    y: camera.y + sy * camera.viewHeight
  };
}

svg.addEventListener('wheel', (e) => {
  e.preventDefault();

  const rect = svg.getBoundingClientRect();
  if (!rect.width || !rect.height || !camera.viewWidth || !camera.viewHeight) return;

  const factor = e.deltaY < 0 ? 1.12 : 1 / 1.12;
  setCameraZoom(camera.zoom * factor, e.clientX, e.clientY);
}, { passive: false });

svg.addEventListener('mousedown', (e) => {
  const pt = getSVGPoint(e);
  
  if (mode === 'wire') {
    const targetTerm = getTerminalFromPointer(e, pt);
    if (!targetTerm) {
      // Check if clicking an existing wire body — select it for deletion
      const wireEl = e.target.closest('.wire-path');
      if (wireEl) {
        wireStart = null;
        wireCursor = null;
        const idx = parseInt(wireEl.dataset.wireIdx);
        selectedId = 'wire_' + idx;
        render();
        renderProperties();
        return;
      }
      if (wireStart) {
        wireStart = null;
        wireCursor = null;
        render();
      }
      return;
    }

    if (!wireStart) {
      wireStart = { compId: targetTerm.compId, termIdx: targetTerm.termIdx, x: targetTerm.x, y: targetTerm.y };
      wireCursor = { x: targetTerm.x, y: targetTerm.y };
      render();
    } else {
      // Clicking the same terminal cancels the current wire.
      if (wireStart.compId === targetTerm.compId && wireStart.termIdx === targetTerm.termIdx) {
        wireStart = null;
        wireCursor = null;
        render();
        return;
      }
      saveState();
      // Auto-route: create L-shaped wire (horizontal then vertical)
      autoRouteWire(wireStart.x, wireStart.y, targetTerm.x, targetTerm.y);
      wireStart = null;
      wireCursor = null;
      render();
    }
    return;
  }
  
  if (mode === 'select') {
    // Check if clicking a wire
    const wireEl = e.target.closest('.wire-path');
    if (wireEl) {
      const idx = parseInt(wireEl.dataset.wireIdx);
      selectedId = 'wire_' + idx;
      renderProperties();
      return;
    }
    // Check component
    const compEl = e.target.closest('.comp-group');
    if (compEl) {
      const id = compEl.dataset.compId;
      selectedId = id;
      const comp = components.find(c => c.id === id);
      dragging = comp;
      dragOffset = { x: pt.x - comp.x, y: pt.y - comp.y };
      render();
    } else {
      selectedId = null; render();
    }
  }
});

svg.addEventListener('mousemove', (e) => {
  if (dragging && mode === 'select') {
    const pt = getSVGPoint(e);
    const nx = snap(pt.x - dragOffset.x);
    const ny = snap(pt.y - dragOffset.y);
    // Move attached wires
    const oldTerms = getTerminalPositions(dragging);
    dragging.x = nx; dragging.y = ny;
    const newTerms = getTerminalPositions(dragging);
    oldTerms.forEach((ot, i) => {
      const nt = newTerms[i];
      wires.forEach(w => {
        if (Math.abs(w.x1 - ot.x) < 2 && Math.abs(w.y1 - ot.y) < 2) { w.x1 = nt.x; w.y1 = nt.y; }
        if (Math.abs(w.x2 - ot.x) < 2 && Math.abs(w.y2 - ot.y) < 2) { w.x2 = nt.x; w.y2 = nt.y; }
      });
    });
    render();
  }
  
  // Highlight terminals on hover in wire mode
  if (mode === 'wire') {
    const pt = getSVGPoint(e);
    const hoverTerm = getTerminalFromPointer(e, pt);
    wireCursor = hoverTerm ? { x: hoverTerm.x, y: hoverTerm.y } : { x: snap(pt.x), y: snap(pt.y) };
    render();

    if (hoverTerm) {
      const selector = `.terminal[data-comp-id="${hoverTerm.compId}"][data-term-idx="${hoverTerm.termIdx}"] .terminal-dot`;
      const dot = document.querySelector(selector);
      if (dot) {
        dot.setAttribute('stroke', '#b91c1c');
        dot.setAttribute('stroke-width', '3');
        dot.setAttribute('fill', '#f87171');
      }
    }
  }
});

svg.addEventListener('mouseup', () => {
  if (dragging) { saveState(); dragging = null; }
});

// Double-click to cancel wire
svg.addEventListener('dblclick', () => { wireStart = null; wireCursor = null; render(); });

// ============ DRAG FROM LIBRARY ============
document.querySelectorAll('.component-item').forEach(item => {

const container = document.getElementById('canvas-container');
container.addEventListener('dragover', (e) => { e.preventDefault(); });
container.addEventListener('drop', (e) => {
  e.preventDefault();
  if (!dragData) return;
  const pt = getSVGPoint(e);
  const x = snap(pt.x);
  const y = snap(pt.y);
  saveState();
  const comp = {
    id: 'comp_' + Date.now() + '_' + Math.random().toString(36).substr(2,5),
    type: dragData,
    name: getNextLabel(dragData),
    value: compDefs[dragData].defaultValue,
    x, y, rotation: 0
  };
  components.push(comp);
  selectedId = comp.id;
  dragData = null;
  render();
  // Set dragging so you can continue moving the component immediately
  dragging = comp;

});

// ============ TOOLBAR ACTIONS ============
function rotateSelected() {
  if (!selectedId) return;
  const comp = components.find(c => c.id === selectedId);
  if (!comp) return;
  saveState();
  const oldTerms = getTerminalPositions(comp);
  comp.rotation = ((comp.rotation || 0) + 90) % 360;
  const newTerms = getTerminalPositions(comp);
  oldTerms.forEach((ot, i) => {
    const nt = newTerms[i];
    wires.forEach(w => {
      if (Math.abs(w.x1 - ot.x) < 2 && Math.abs(w.y1 - ot.y) < 2) { w.x1 = nt.x; w.y1 = nt.y; }
      if (Math.abs(w.x2 - ot.x) < 2 && Math.abs(w.y2 - ot.y) < 2) { w.x2 = nt.x; w.y2 = nt.y; }
    });
  });
  render();
}

function deleteSelected() {
  if (!selectedId) return;
  saveState();
  if (selectedId.startsWith('wire_')) {
    const idx = parseInt(selectedId.split('_')[1]);
    wires.splice(idx, 1);
  } else {
    // Remove wires connected to this component
    const comp = components.find(c => c.id === selectedId);
    if (comp) {
      const terms = getTerminalPositions(comp);
      wires = wires.filter(w => {
        return !terms.some(t => (Math.abs(w.x1-t.x)<2 && Math.abs(w.y1-t.y)<2) || (Math.abs(w.x2-t.x)<2 && Math.abs(w.y2-t.y)<2));
      });
      components = components.filter(c => c.id !== selectedId);
    }
  }
  selectedId = null; render();
}

// ============ KEYBOARD ============
document.addEventListener('keydown', (e) => {
  if (e.target.tagName === 'INPUT') return;
  if (e.key === 'ArrowUp') { e.preventDefault(); panCanvas('up'); return; }
  if (e.key === 'ArrowDown') { e.preventDefault(); panCanvas('down'); return; }
  if (e.key === 'ArrowLeft') { e.preventDefault(); panCanvas('left'); return; }
  if (e.key === 'ArrowRight') { e.preventDefault(); panCanvas('right'); return; }
  if (e.key === 'Delete' || e.key === 'Backspace') deleteSelected();
  if (e.key === 'r') rotateSelected();
  if (e.key === 'Escape') { wireStart = null; wireCursor = null; selectedId = null; render(); }
  if (e.ctrlKey && e.key === 'z') { e.preventDefault(); undoAction(); }
  if (e.ctrlKey && e.key === 'y') { e.preventDefault(); redoAction(); }
});

function toggleExportMenu() {

}
document.addEventListener('click', (e) => {
  if (!e.target.closest('#export-menu') && !e.target.closest('[onclick="toggleExportMenu()"]')) {
    document.getElementById('export-menu').classList.add('hidden');
  }
});

function getExportSVG() {
  const clone = svg.cloneNode(true);
  clone.removeAttribute('class');
  clone.setAttribute('style', 'background:white');
  clone.querySelectorAll('.terminal').forEach(t => t.remove());
  clone.querySelectorAll('.selected-component').forEach(el => el.classList.remove('selected-component'));
  // Get bounding box
  let minX=Infinity,minY=Infinity,maxX=-Infinity,maxY=-Infinity;
  components.forEach(c => { minX=Math.min(minX,c.x-60); minY=Math.min(minY,c.y-60); maxX=Math.max(maxX,c.x+60); maxY=Math.max(maxY,c.y+60); });
  wires.forEach(w => { minX=Math.min(minX,w.x1,w.x2); minY=Math.min(minY,w.y1,w.y2); maxX=Math.max(maxX,w.x1,w.x2); maxY=Math.max(maxY,w.y1,w.y2); });
  if (components.length === 0 && wires.length === 0) { minX=0;minY=0;maxX=400;maxY=300; }
  const pad = 40;
  clone.setAttribute('viewBox', `${minX-pad} ${minY-pad} ${maxX-minX+pad*2} ${maxY-minY+pad*2}`);
  clone.setAttribute('width', maxX-minX+pad*2);
  clone.setAttribute('height', maxY-minY+pad*2);
  return new XMLSerializer().serializeToString(clone);
}

function exportSVG() {
  const data = getExportSVG();
  const blob = new Blob([data], {type:'image/svg+xml'});
  downloadBlob(blob, 'circuit.svg');
  showToast('SVG downloaded');
}

function exportPNG() {
  const data = getExportSVG();
  const img = new Image();
  img.onload = () => {
    const canvas = document.createElement('canvas');
    canvas.width = img.width * 2; canvas.height = img.height * 2;
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = 'white'; ctx.fillRect(0,0,canvas.width,canvas.height);
    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
    canvas.toBlob(blob => { downloadBlob(blob, 'circuit.png'); showToast('PNG downloaded'); });
  };
  img.src = 'data:image/svg+xml;base64,' + btoa(unescape(encodeURIComponent(data)));
}

function exportPDF() {
  // Simple PDF with embedded SVG as PNG
  exportPNG(); // Fallback - real PDF would need a library
  showToast('PDF export uses PNG format');
}

function copyAsImage() {
  const data = getExportSVG();
  const img = new Image();
  img.onload = () => {
    const canvas = document.createElement('canvas');
    canvas.width = img.width * 2; canvas.height = img.height * 2;
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = 'white'; ctx.fillRect(0,0,canvas.width,canvas.height);
    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
    canvas.toBlob(blob => {
      navigator.clipboard.write([new ClipboardItem({'image/png': blob})]).then(() => showToast('Copied to clipboard'));
    });
  };
  img.src = 'data:image/svg+xml;base64,' + btoa(unescape(encodeURIComponent(data)));
}

function downloadBlob(blob, name) {
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
  a.download = name; a.click(); URL.revokeObjectURL(a.href);
}

function resetWorkspace() {
  components = [];
  wires = [];
  undoStack = [];
  redoStack = [];
  selectedId = null;
  mode = 'select';
  wireStart = null;
  wireCursor = null;
  nextIds = {};
  camera.x = 0;
  camera.y = 0;
  camera.zoom = 1;

}

// ============ SAVE/LOAD ============
function saveProject() {
  const data = JSON.stringify({ components, wires, nextIds }, null, 2);
  downloadBlob(new Blob([data], {type:'application/json'}), 'circuit-project.json');
  showToast('Project saved');
}
function loadProject() { document.getElementById('file-input').click(); }
function handleFileLoad(e) {
  const file = e.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = (ev) => {
    try {
      const data = JSON.parse(ev.target.result);
      saveState();
      components = data.components || [];
      wires = data.wires || [];
      nextIds = data.nextIds || {};
      selectedId = null; render();
      showToast('Project loaded');
    } catch(err) { showToast('Invalid file'); }
  };
  reader.readAsText(file);
  e.target.value = '';
}

  container.appendChild(toast);

}
