  <script>
    // ===== DATA =====
    const topics = [
      {
        name: "Charles' Law",
        subtitle: "Exploring volume–temperature relationships at constant pressure",
        description: {
          intro: "In the PASCO setup, water is heated around the thermal can so the aluminum cylinder warms the trapped gas. As the gas temperature rises at roughly constant pressure, the piston moves outward and the gas volume increases linearly with temperature.",
          variables: ["Temperature (K) — Independent variable", "Volume (mL) — Dependent variable"],
          controlledVariables: ["Pressure (kPa) — kept constant", "Amount of gas (mol) — kept constant"],
          trendline: "Linear: V = kT (where k is a constant)",
          application: "The same heating-and-expansion idea is used in gas thermometers, hot-air balloons, and sealed piston experiments that measure how gas volume responds to temperature changes."
        },
        sim: { xLabel: "Bath Temperature (K)", yLabel: "Volume (mL)", xMin: 295, xMax: 385, generate: t => getCharlesVolume(t), derived: { label: "Charles' Constant (V/T)", compute: (x) => (getCharlesVolume(x) / x).toFixed(4) + ' mL/K' } },
        quiz: [
          { q: "What happens to gas volume when temperature increases at constant pressure?", opts: ["Decreases", "Increases linearly", "Stays the same", "Increases exponentially"], correct: 1, explain: "Charles' Law states V ∝ T at constant pressure, giving a linear increase." },
          { q: "What temperature scale must be used for Charles' Law?", opts: ["Celsius", "Fahrenheit", "Kelvin", "Any scale"], correct: 2, explain: "Kelvin (absolute temperature) must be used because Charles' Law requires T=0 to mean zero molecular motion." },
          { q: "If volume is 100 mL at 300 K, what is it at 600 K?", opts: ["50 mL", "100 mL", "200 mL", "400 mL"], correct: 2, explain: "Doubling temperature doubles volume: V₂ = V₁(T₂/T₁) = 100(600/300) = 200 mL." },
          { q: "The graph of V vs T (in Kelvin) for Charles' Law is:", opts: ["A curve", "A straight line through origin", "A hyperbola", "An exponential"], correct: 1, explain: "V = kT is a linear equation passing through the origin (absolute zero)." },
          { q: "Which real-world example demonstrates Charles' Law?", opts: ["Scuba tank pressure", "Hot air balloon inflation", "Rusting iron", "Dissolving sugar"], correct: 1, explain: "Hot air balloons work by heating air to increase its volume, reducing density." }
        ]
      },
      {
        name: "Boyle's Law",
        subtitle: "Discovering the pressure–volume inverse relationship",
        description: {
          intro: "In the PASCO gas-law apparatus, manually pushing the piston downward compresses the trapped gas. As piston position lowers the gas volume, the connected pressure sensor reports a higher pressure at approximately constant temperature.",
          variables: ["Piston Position (mm) — Independent variable", "Pressure (kPa) — Dependent variable"],
          controlledVariables: ["Temperature (K) — kept constant", "Amount of gas (mol) — kept constant"],
          trendline: "Inverse: P = k/V (hyperbola)",
          application: "Manual piston compression in lab apparatus, breathing mechanics, and syringe systems all rely on Boyle's Law: reducing gas volume raises pressure."
        },
        sim: {
          xLabel: "Piston Position (mm)",
          yLabel: "Pressure (kPa)",
          xMin: 20,
          xMax: 100,
          generate: pos => getBoylePressureFromPosition(pos),
          derived: {
            label: "Estimated Volume and Boyle's Constant",
            compute: (x, y) => {
              const volume = getBoyleVolumeFromPosition(x);
              return `V≈${volume.toFixed(1)} mL | P×V=${(y * volume).toFixed(1)} kPa·mL`;
            }
          }
        },
        quiz: [
          { q: "Boyle's Law describes the relationship between:", opts: ["Pressure and temperature", "Volume and temperature", "Pressure and volume", "Density and pressure"], correct: 2, explain: "Boyle's Law: P₁V₁ = P₂V₂ at constant temperature." },
          { q: "If you halve the volume of a gas at constant temperature, pressure:", opts: ["Halves", "Doubles", "Stays the same", "Quadruples"], correct: 1, explain: "PV = k, so if V is halved, P must double to maintain the constant." },
          { q: "The graph of P vs V for Boyle's Law is:", opts: ["A straight line", "A parabola", "A hyperbola", "An S-curve"], correct: 2, explain: "P = k/V produces a hyperbolic curve." },
          { q: "Which condition must remain constant for Boyle's Law?", opts: ["Pressure", "Volume", "Temperature", "Amount of gas and temperature"], correct: 3, explain: "Boyle's Law requires constant temperature and amount of gas." },
          { q: "A syringe with 60 mL of air is compressed to 20 mL. If initial pressure is 100 kPa, final pressure is:", opts: ["100 kPa", "200 kPa", "300 kPa", "33 kPa"], correct: 2, explain: "P₂ = P₁V₁/V₂ = 100×60/20 = 300 kPa." }
        ]
      },
      {
        name: "First-Order Reaction Kinetics",
        subtitle: "Exponential concentration decay in a first-order reaction",
        description: {
          intro: "In a first-order reaction, the rate of reaction depends only on the concentration of a single reactant: rate = k[A]. Because the rate is proportional to the current concentration, the concentration decays exponentially over time following [A] = [A]₀ × e^(−kt), where k is the first-order rate constant (s⁻¹) and t is elapsed time. This means each successive half-life removes the same fraction — not the same amount — of remaining reactant.",
          variables: ["Time (s) — Independent variable", "Concentration (mol/L) — Dependent variable"],
          controlledVariables: ["Temperature (K) — kept constant", "Catalyst presence — kept constant", "Reaction volume — kept constant"],
          trendline: "Exponential decay: [A] = [A]₀ × e^(−kt), with constant half-life t½ = ln(2)/k",
          application: "Radioactive decay, drug metabolism in the body, and decomposition of hydrogen peroxide all follow first-order kinetics. The constant half-life concept — central to nuclear medicine and pharmacokinetics — arises directly from this first-order rate law."
        },
        sim: { xLabel: "Time (s)", yLabel: "Concentration (mol/L)", xMin: 0, xMax: 60, generate: t => (1.0 * Math.exp(-0.05 * t) + Math.random() * 0.03).toFixed(3), derived: { label: "Reaction Progress", compute: (x, y) => `${(y * 100).toFixed(1)}% of [A]₀ remaining | t½ = ${(Math.LN2 / 0.05).toFixed(2)} s` } },
        quiz: [
          { q: "In first-order kinetics, concentration vs time gives:", opts: ["A straight line", "A parabola", "An exponential decay curve", "A step function"], correct: 2, explain: "[A] = [A]₀e^(-kt) produces exponential decay." },
          { q: "What is the half-life of a first-order reaction with k = 0.05 s⁻¹?", opts: ["10 s", "13.9 s", "20 s", "50 s"], correct: 1, explain: "t½ = ln(2)/k = 0.693/0.05 ≈ 13.9 s." },
          { q: "Doubling the initial concentration in a first-order reaction:", opts: ["Doubles the half-life", "Halves the rate constant", "Doubles the initial rate", "Has no effect on half-life"], correct: 2, explain: "Rate = k[A], so doubling [A] doubles the rate. Half-life is independent of concentration." },
          { q: "A plot of ln[A] vs time for first-order gives:", opts: ["A curve", "A straight line with negative slope", "A horizontal line", "A parabola"], correct: 1, explain: "ln[A] = ln[A]₀ - kt is linear with slope = -k." },
          { q: "Which is an example of first-order kinetics?", opts: ["Combining two solutions", "Radioactive decay", "Burning wood", "Neutralization"], correct: 1, explain: "Radioactive decay follows first-order kinetics with a constant half-life." }
        ]
      },
      {
        name: "Beer-Lambert Law",
        subtitle: "Building a linear absorbance–concentration calibration curve",
        description: {
          intro: "The absorbance of a solution is directly proportional to its concentration and path length. A = εlc produces a linear calibration curve that allows unknown concentrations to be determined from measured absorbance.",
          variables: ["Concentration (mol/L) — Independent variable", "Absorbance (AU) — Dependent variable"],
          controlledVariables: ["Path length (l) — kept constant", "Wavelength — kept constant", "Solvent/cuvette type — kept constant"],
          trendline: "Linear calibration: A = εlc (slope = εl)",
          application: "Spectrophotometry in clinical labs measures blood glucose, protein levels, and drug concentrations. Environmental monitoring uses this law to measure pollutant concentrations in water samples."
        },
        sim: { xLabel: "Concentration (mol/L)", yLabel: "Absorbance (AU)", xMin: 0, xMax: 0.1, generate: c => (12 * c + Math.random() * 0.02).toFixed(3), derived: { label: "Transmittance (%T)", compute: (x, y) => (Math.pow(10, -y) * 100).toFixed(1) + '%' } },
        quiz: [
          { q: "Beer-Lambert Law states that absorbance is proportional to:", opts: ["Temperature", "Pressure", "Concentration and path length", "Wavelength"], correct: 2, explain: "A = εlc, where ε is molar absorptivity, l is path length, c is concentration." },
          { q: "A calibration curve in Beer-Lambert Law should be:", opts: ["Exponential", "A straight line through origin", "A hyperbola", "S-shaped"], correct: 1, explain: "A = εlc is linear with y-intercept at origin (zero concentration = zero absorbance)." },
          { q: "If absorbance doubles, concentration:", opts: ["Halves", "Doubles", "Stays the same", "Quadruples"], correct: 1, explain: "A ∝ c, so doubling A means concentration has doubled." },
          { q: "The slope of a Beer-Lambert calibration curve equals:", opts: ["Concentration", "Absorbance", "εl (molar absorptivity × path length)", "Wavelength"], correct: 2, explain: "In A = (εl)c, the slope is εl." },
          { q: "To find an unknown concentration, you:", opts: ["Measure its mass", "Use the calibration curve equation", "Heat the solution", "Add indicator"], correct: 1, explain: "Substitute the measured absorbance into A = (εl)c and solve for c." }
        ]
      }
    ];

    topics[1].description.intro = "In the PASCO gas law apparatus, the piston is pushed down manually to compress trapped gas. The piston position sets gas volume, and the connected pressure sensor measures how pressure rises as volume decreases at constant temperature (25 °C).";
    topics[1].description.variables = ["Volume (mL) — Independent variable", "Pressure (kPa) — Dependent variable"];
    topics[1].description.controlledVariables = ["Temperature — 25 °C (298.2 K), kept constant", "Amount of gas (mol) — kept constant"];
    topics[1].description.application = "Manual piston compression in lab apparatus, breathing mechanics, and syringe systems all rely on Boyle's Law: reducing gas volume raises pressure.";
    topics[1].sim.xLabel = "Volume (mL)";
    topics[1].sim.yLabel = "Pressure (kPa)";
    topics[1].sim.xMin = 20;
    topics[1].sim.xMax = 100;
    topics[1].sim.generate = pos => getBoylePressureFromPosition(pos);
    topics[1].sim.derived = {
      label: "Temperature (constant)",
      compute: (x, y) => {
        const volume = getBoyleVolumeFromPosition(x);
        return `T = 25.0 \u00b0C (298.2 K) | P\u00d7V = ${(y * volume).toFixed(1)} kPa\u00b7mL`;
      }
    };

    let currentTopic = 0;
    let currentSection = 0;
    let dataPoints = [[], [], [], []]; // per topic
    let quizStates = [{}, {}, {}, {}]; // per topic
    let tableEditStates = [null, null, null, null]; // per topic row edit state
    const defaultTrendlines = ['none', 'none', 'none', 'none'];
    let selectedTrendlines = [...defaultTrendlines]; // per topic trendline type
    let smoothGraphLines = [false, false, false, false]; // per topic smooth line toggle
    let simInputValues = topics.map(topic => topic.sim.xMin); // per topic simulation x-value
    let currentSimPoint = { x: null, y: null }; // active simulation reading for the record button

    function getCharlesVolume(tempK) {
      const clampedTemp = Math.max(295, Math.min(385, tempK));
      const k = 110 / 295; // mL/K at the baseline point
      return k * clampedTemp;
    }

    function getBoyleVolumeFromPosition(displacementMm) {
      // V = A × Height, A = 1000 mm², initial height H₀ = 100 mm
      // V (mL) = 1000 mm² × H(mm) / 1000 mm³·mL⁻¹ = H numerically
      // Height decreases as piston is pushed down: H = H₀ − displacement
      const H0 = 100; // mm (initial gas column height)
      const clampedDisp = Math.max(0, Math.min(80, displacementMm));
      return H0 - clampedDisp; // volume in mL
    }

    function getBoylePressureFromPosition(positionMm) {
      const volume = getBoyleVolumeFromPosition(positionMm);
      return getBoylePressure(volume);
    }

    function getBoylePressure(volumeMl) {
      const clampedVolume = Math.max(10, Math.min(200, volumeMl));
      const boyleConstant = 10132.5; // 101.325 kPa × 100 mL (atmospheric pressure at zero displacement)
      return boyleConstant / clampedVolume;
    }

    function applyMeasurementVariation(value, variation = 0.02) {
      if (!Number.isFinite(value)) return value;
      const factor = 1 + ((Math.random() * 2 - 1) * variation);
      return Math.max(0, value * factor);
    }

    function addManualRow() {
      const sim = topics[currentTopic].sim;
      const ySeed = parseFloat(sim.generate(sim.xMin));
      dataPoints[currentTopic].push({ x: sim.xMin, y: Number.isFinite(ySeed) ? ySeed : sim.xMin });
      tableEditStates[currentTopic] = { index: dataPoints[currentTopic].length - 1, isNew: true };
      renderDataTable(document.getElementById('content-area'));
      lucide.createIcons();
    }

    function startEditRow(index) {
      if (index < 0 || index >= dataPoints[currentTopic].length) return;
      tableEditStates[currentTopic] = { index, isNew: false };
      renderDataTable(document.getElementById('content-area'));
      lucide.createIcons();
    }

    function cancelEditRow() {
      const editState = tableEditStates[currentTopic];
      if (editState && editState.isNew) {
        dataPoints[currentTopic].splice(editState.index, 1);
      }
      tableEditStates[currentTopic] = null;
      renderDataTable(document.getElementById('content-area'));
      lucide.createIcons();

    function saveEditedRow(index) {
      const xInput = document.getElementById(`edit-x-${index}`);
      const yInput = document.getElementById(`edit-y-${index}`);
      if (!xInput || !yInput) return;
      const x = parseFloat(xInput.value);
      const y = parseFloat(yInput.value);
      if (!Number.isFinite(x) || !Number.isFinite(y)) {
        showToast('Please enter valid numeric values.');
        return;
      }
      dataPoints[currentTopic][index] = { x, y };
      tableEditStates[currentTopic] = null;
      renderDataTable(document.getElementById('content-area'));
      lucide.createIcons();
      showToast('Row saved');
    }

    function deleteDataRow(index) {
      if (index < 0 || index >= dataPoints[currentTopic].length) return;
      dataPoints[currentTopic].splice(index, 1);
      const editState = tableEditStates[currentTopic];
      if (editState) {
        if (editState.index === index) tableEditStates[currentTopic] = null;
        else if (editState.index > index) tableEditStates[currentTopic] = { ...editState, index: editState.index - 1 };
      }
      renderDataTable(document.getElementById('content-area'));
      lucide.createIcons();
      showToast('Row deleted');
    }

    function triggerImportCSV() {

    function importCSVFile(event) {
      const file = event.target.files && event.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = function(e) {
        const text = String(e.target.result || '');
        const lines = text.split(/\r?\n/).map(line => line.trim()).filter(Boolean);
        if (lines.length < 2) {
          showToast('CSV must include a header and at least one data row.');
          event.target.value = '';
          return;
        }
        const parsed = [];
        for (let i = 1; i < lines.length; i++) {
          const cols = lines[i].split(',').map(c => c.trim());
          if (cols.length < 2) continue;
          const x = parseFloat(cols[0]);
          const y = parseFloat(cols[1]);
          if (Number.isFinite(x) && Number.isFinite(y)) parsed.push({ x, y });
        }
        if (!parsed.length) {
          showToast('No valid numeric rows found in CSV.');
          event.target.value = '';
          return;
        }
        dataPoints[currentTopic] = dataPoints[currentTopic].concat(parsed);
        tableEditStates[currentTopic] = null;
        renderDataTable(document.getElementById('content-area'));
        lucide.createIcons();
        showToast(`${parsed.length} rows imported`);
        event.target.value = '';
      };
      reader.readAsText(file);
    }

      const sim = topics[currentTopic].sim;
      const range = sim.xMax - sim.xMin;
      for (let i = 0; i < 8; i++) {

        const y = applyMeasurementVariation(parseFloat(sim.generate(x)));
        dataPoints[currentTopic].push({ x, y });

      renderDataTable(document.getElementById('content-area'));
      lucide.createIcons();
      showToast('8 sample points generated');

    function computeFit(data, trendlineType) {
      const xs = data.map(d => d.x), ys = data.map(d => d.y);

      if (trendlineType === 'none') {
        return {
          equation: 'No trendline selected',
          r2: NaN,
          interpretation: 'Select a trendline type to run a regression analysis.',
          type: 'none',
          predict: () => NaN
        };
      }

      const withR2 = (equation, type, predict, interpretation) => {
        const preds = xs.map(x => predict(x));
        return { equation, r2: calcR2(ys, preds), interpretation, type, predict };
      };

      if (trendlineType === 'linear') {
        const { m, b } = linearFit(xs, ys);
        const predict = x => m * x + b;
        return withR2(`y = ${m.toFixed(4)}x + ${b.toFixed(4)}`, 'linear', predict, 'Linear fit shows how directly y changes with x.');
      }

      if (trendlineType === 'inverse') {
        const invX = xs.map(x => 1 / (Math.abs(x) < 1e-9 ? 1e-9 : x));
        const { m, b } = linearFit(invX, ys);
        const predict = x => m / (Math.abs(x) < 1e-9 ? 1e-9 : x) + b;
        return withR2(`y = ${m.toFixed(4)}/x + ${b.toFixed(4)}`, 'inverse', predict, 'Inverse fit suggests y decreases as x increases.');
      }

      if (trendlineType === 'inverse_square') {
        const invSqX = xs.map(x => 1 / ((Math.abs(x) < 1e-9 ? 1e-9 : x) ** 2));
        const { m, b } = linearFit(invSqX, ys);
        const predict = x => m / ((Math.abs(x) < 1e-9 ? 1e-9 : x) ** 2) + b;
        return withR2(`y = ${m.toFixed(4)}/x² + ${b.toFixed(4)}`, 'inverse_square', predict, 'Inverse-square fit emphasizes rapid drop-off at larger x.');
      }

      if (trendlineType === 'quadratic') {
        const q = quadraticFit(xs, ys);
        const predict = x => q.a * x * x + q.b * x + q.c;
        return withR2(`y = ${q.a.toFixed(4)}x² + ${q.b.toFixed(4)}x + ${q.c.toFixed(4)}`, 'quadratic', predict, 'Quadratic fit captures curved relationships with changing slope.');
      }

      if (trendlineType === 'exponential') {
        const valid = data.filter(d => d.y > 0);
        if (valid.length < 2) {
          return {
            equation: 'Exponential fit unavailable',
            r2: NaN,
            interpretation: 'Exponential regression requires positive y values.',
            type: 'exponential',
            predict: () => NaN
          };
        }
        const vx = valid.map(d => d.x);
        const vlny = valid.map(d => Math.log(d.y));
        const { m, b } = linearFit(vx, vlny);
        const A0 = Math.exp(b);
        const predict = x => A0 * Math.exp(m * x);
        return withR2(`y = ${A0.toFixed(4)}e^(${m.toFixed(4)}x)`, 'exponential', predict, 'Exponential fit models growth or decay proportional to current value.');
      }

      if (trendlineType === 'logarithmic') {
        const valid = data.filter(d => d.x > 0);
        if (valid.length < 2) {
          return {
            equation: 'Logarithmic fit unavailable',
            r2: NaN,
            interpretation: 'Logarithmic regression requires positive x values.',
            type: 'logarithmic',
            predict: () => NaN
          };
        }
        const lx = valid.map(d => Math.log(d.x));
        const ly = valid.map(d => d.y);
        const { m, b } = linearFit(lx, ly);
        const predict = x => m * Math.log(Math.max(x, 1e-9)) + b;
        return withR2(`y = ${m.toFixed(4)}ln(x) + ${b.toFixed(4)}`, 'logarithmic', predict, 'Logarithmic fit captures quick initial change then leveling.');
      }

      if (trendlineType === 'power2' || trendlineType === 'power3' || trendlineType === 'power4') {
        const p = trendlineType === 'power2' ? 2 : trendlineType === 'power3' ? 3 : 4;
        const xp = xs.map(x => x ** p);
        const { m, b } = linearFit(xp, ys);
        const predict = x => m * (x ** p) + b;
        return withR2(`y = ${m.toFixed(4)}x^${p} + ${b.toFixed(4)}`, trendlineType, predict, `Power-${p} fit tests whether y follows an x^${p} shape.`);
      }

      return {
        equation: 'Fit unavailable',
        r2: NaN,
        interpretation: 'Unsupported trendline type.',
        type: 'none',
        predict: () => NaN
      };
    }

    function calcR2(actual, predicted) {
      if (!actual.length || actual.length !== predicted.length) return NaN;
      const mean = actual.reduce((a, b) => a + b, 0) / actual.length;
      let ssRes = 0;
      let ssTot = 0;
      for (let i = 0; i < actual.length; i++) {
        if (!Number.isFinite(predicted[i])) continue;
        ssRes += (actual[i] - predicted[i]) ** 2;
        ssTot += (actual[i] - mean) ** 2;
      }
      if (ssTot === 0) return 1;
      return 1 - ssRes / ssTot;
    }

    function quadraticFit(xs, ys) {
      const n = xs.length;
      const sx = xs.reduce((a, x) => a + x, 0);
      const sx2 = xs.reduce((a, x) => a + x * x, 0);
      const sx3 = xs.reduce((a, x) => a + x * x * x, 0);
      const sx4 = xs.reduce((a, x) => a + x * x * x * x, 0);
      const sy = ys.reduce((a, y) => a + y, 0);
      const sxy = xs.reduce((a, x, i) => a + x * ys[i], 0);
      const sx2y = xs.reduce((a, x, i) => a + x * x * ys[i], 0);
      const [a, b, c] = solve3x3([
        [sx4, sx3, sx2],
        [sx3, sx2, sx],
        [sx2, sx, n]
      ], [sx2y, sxy, sy]);
      return { a, b, c };
    }

    function solve3x3(mat, rhs) {
      const a = mat.map(row => [...row]);
      const b = [...rhs];
      for (let i = 0; i < 3; i++) {
        let maxRow = i;
        for (let r = i + 1; r < 3; r++) {
          if (Math.abs(a[r][i]) > Math.abs(a[maxRow][i])) maxRow = r;
        }
        [a[i], a[maxRow]] = [a[maxRow], a[i]];
        [b[i], b[maxRow]] = [b[maxRow], b[i]];
        const pivot = Math.abs(a[i][i]) < 1e-12 ? 1e-12 : a[i][i];
        for (let j = i; j < 3; j++) a[i][j] /= pivot;
        b[i] /= pivot;
        for (let r = 0; r < 3; r++) {
          if (r === i) continue;
          const factor = a[r][i];
          for (let j = i; j < 3; j++) a[r][j] -= factor * a[i][j];
          b[r] -= factor * b[i];
        }
      }
      return b;
    }

    function linearFit(xs, ys) {
      const n = xs.length;
      const sx = xs.reduce((a, b) => a + b, 0), sy = ys.reduce((a, b) => a + b, 0);
      const sxx = xs.reduce((a, x) => a + x * x, 0), sxy = xs.reduce((a, x, i) => a + x * ys[i], 0);
      const syy = ys.reduce((a, y) => a + y * y, 0);
      const m = (n * sxy - sx * sy) / (n * sxx - sx * sx);
      const b = (sy - m * sx) / n;
      const ssRes = ys.reduce((a, y, i) => a + (y - (m * xs[i] + b)) ** 2, 0);
      const ssTot = ys.reduce((a, y) => a + (y - sy / n) ** 2, 0);
      const r2 = ssTot === 0 ? 1 : 1 - ssRes / ssTot;
      return { m, b, r2 };
    }

    function drawGraph(data, trendlineType, smoothOn) {
      const canvas = document.getElementById('graph-canvas');
      if (!canvas) return;
      const ctx = canvas.getContext('2d');
      const useSmoothLine = smoothOn && data.length >= 3;
      const W = canvas.width, H = canvas.height;
      const pad = { top: 30, right: 30, bottom: 50, left: 60 };
      const gW = W - pad.left - pad.right, gH = H - pad.top - pad.bottom;

      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0, 0, W, H);

      const xs = data.map(d => d.x), ys = data.map(d => d.y);
      const xMin = Math.min(...xs) * 0.9, xMax = Math.max(...xs) * 1.1;
      const yMin = Math.min(...ys) * 0.9, yMax = Math.max(...ys) * 1.1;

      const toX = x => pad.left + (x - xMin) / (xMax - xMin) * gW;

      // Grid
      ctx.strokeStyle = '#bae6fd44';
      ctx.lineWidth = 0.5;
      for (let i = 0; i <= 5; i++) {
        const y = pad.top + gH * i / 5;
        ctx.beginPath(); ctx.moveTo(pad.left, y); ctx.lineTo(pad.left + gW, y); ctx.stroke();
        const x = pad.left + gW * i / 5;
        ctx.beginPath(); ctx.moveTo(x, pad.top); ctx.lineTo(x, pad.top + gH); ctx.stroke();
      }

      // Axes
      ctx.strokeStyle = '#0369a1';
      ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.moveTo(pad.left, pad.top); ctx.lineTo(pad.left, pad.top + gH); ctx.lineTo(pad.left + gW, pad.top + gH); ctx.stroke();

      // Labels
      ctx.fillStyle = '#0369a1';
      ctx.font = '10px JetBrains Mono';
      ctx.textAlign = 'center';
      ctx.fillText(topics[currentTopic].sim.xLabel, pad.left + gW / 2, H - 8);
      ctx.save(); ctx.translate(12, pad.top + gH / 2); ctx.rotate(-Math.PI / 2);
      ctx.fillText(topics[currentTopic].sim.yLabel, 0, 0); ctx.restore();

      // Axis values
      ctx.fillStyle = '#0369a1';
      ctx.font = '9px JetBrains Mono';
      for (let i = 0; i <= 5; i++) {
        const xv = xMin + (xMax - xMin) * i / 5;
        ctx.textAlign = 'center';
        ctx.fillText(xv.toPrecision(3), toX(xv), pad.top + gH + 15);
        const yv = yMin + (yMax - yMin) * i / 5;
        ctx.textAlign = 'right';
        ctx.fillText(yv.toPrecision(3), pad.left - 5, toY(yv) + 3);
      }

      // Optional smooth connector between points
      const sorted = [...data].sort((a, b) => a.x - b.x);
      if (useSmoothLine && sorted.length > 1) {
        ctx.strokeStyle = '#0ea5e999';
        ctx.lineWidth = 1.8;
        ctx.lineJoin = 'round';
        ctx.lineCap = 'round';
        ctx.beginPath();
        ctx.moveTo(toX(sorted[0].x), toY(sorted[0].y));
        for (let i = 0; i < sorted.length - 1; i++) {
          const p0 = sorted[i];
          const p1 = sorted[i + 1];
          const cx = (toX(p0.x) + toX(p1.x)) / 2;
          const cy = (toY(p0.y) + toY(p1.y)) / 2;
          ctx.quadraticCurveTo(toX(p0.x), toY(p0.y), cx, cy);

        ctx.lineTo(toX(last.x), toY(last.y));
        ctx.lineTo(toX(last.x), toY(last.y));

        ctx.lineCap = 'butt';

      const fit = computeFit(data, trendlineType);
      if (fit.type !== 'none' && fit.type !== 'unsupported') {
        ctx.strokeStyle = '#f59e0bdd';
        ctx.lineWidth = 2.5;
        ctx.setLineDash([5, 3]);
        ctx.beginPath();
        let started = false;
        for (let i = 0; i <= 140; i++) {
          const x = xMin + (xMax - xMin) * i / 140;
          const y = fit.predict(x);
          if (!Number.isFinite(y)) continue;
          const px = toX(x), py = toY(y);
          if (py >= pad.top - 4 && py <= pad.top + gH + 4) {

              ctx.moveTo(px, py);
              started = true;
            } else {
              ctx.lineTo(px, py);
            }
          }
        }
        ctx.stroke();
        ctx.setLineDash([]);
      }

      // Points
      data.forEach(d => {
        ctx.fillStyle = '#0ea5e9';
        ctx.beginPath();
        ctx.arc(toX(d.x), toY(d.y), 4, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = '#0369a1';
        ctx.lineWidth = 1.5;
        ctx.stroke();
      });
    }

    function calcUnknown() {
      const data = dataPoints[currentTopic];
      if (data.length < 2) return;
      const abs = parseFloat(document.getElementById('unknown-abs').value);
      if (isNaN(abs)) return;
      const { m, b } = linearFit(data.map(d => d.x), data.map(d => d.y));
      if (!Number.isFinite(m) || m === 0) {
        showToast('Unable to compute concentration from current data.');
        return;
      }
      const conc = (abs - b) / m;
      document.getElementById('unknown-result').innerHTML = `<p class="mono text-xs text-teal-700 mt-2">Estimated concentration: <strong>${conc.toFixed(4)} mol/L</strong></p>`;
    }

    // ===== QUIZ =====
    function renderQuiz(area) {
      const quiz = topics[currentTopic].quiz;
      const state = quizStates[currentTopic];
      if (!state.answers) state.answers = {};
      if (state.currentIndex === undefined) state.currentIndex = 0;
      if (state.finished === undefined) state.finished = false;

      const answeredCount = Object.keys(state.answers).length;
      if (state.finished) {
        const score = quiz.reduce((s, item, i) => s + (state.answers[i] === item.correct ? 1 : 0), 0);
        const msg = score === 5 ? 'Perfect mastery. Outstanding work!' : score >= 4 ? 'Great understanding. Minor review recommended.' : score >= 3 ? 'Good progress. Revisit a few concepts.' : 'Review the topic tabs and try again.';
        const celebrate = score >= 4 ? '🏆' : score >= 3 ? '🎉' : '📘';
        area.innerHTML = `<div class="surface-card p-6 text-center space-y-3">
          <div class="quiz-celebrate">${celebrate}</div>
          <h3 class="text-lg font-semibold text-sky-900">${topics[currentTopic].name} Quiz Complete</h3>
          <div class="quiz-summary-score">${score}/${quiz.length}</div>
          <p class="text-sm text-sky-700">${msg}</p>
          <button onclick="resetQuiz()" class="action-btn btn-primary mt-2">Retry Quiz</button>
        </div>`;
        return;
      }

      const qIndex = state.currentIndex;
      const item = quiz[qIndex];
      const selected = state.answers[qIndex];
      const isAnswered = selected !== undefined;
      const progress = Math.round((answeredCount / quiz.length) * 100);

      let optionsHtml = '';
      item.opts.forEach((opt, oi) => {
        let cls = 'quiz-option block w-full text-left px-4 py-2.5 rounded-md text-xs border ';
        if (!isAnswered) {
          cls += 'bg-white border-sky-300 text-sky-900 hover:bg-sky-100 cursor-pointer';
        } else if (oi === item.correct) {
          cls += 'quiz-correct border-emerald-500 text-emerald-700';
        } else if (oi === selected) {
          cls += 'quiz-wrong border-red-500 text-red-700';
        } else {
          cls += 'bg-slate-100 border-sky-200 text-slate-600';
        }
        const onclick = isAnswered ? '' : `onclick="answerQuiz(${oi})"`;
        optionsHtml += `<button ${onclick} class="${cls}">${String.fromCharCode(65 + oi)}. ${opt}</button>`;
      });

      const nextLabel = qIndex === quiz.length - 1 ? 'See Results' : 'Next Question';

      area.innerHTML = `<div class="surface-card p-6">
        <div class="mb-5">
          <div class="quiz-progress-track"><div class="quiz-progress-fill" style="width:${progress}%"></div></div>
          <div class="flex items-center justify-between text-xs text-sky-700">
            <span>Question ${qIndex + 1} of ${quiz.length}</span>
            <span class="mono">${answeredCount}/${quiz.length} answered</span>
          </div>
        </div>
        <div class="p-4 bg-white rounded-lg border border-sky-200">
          <p class="text-sm text-sky-900 font-medium mb-3">${item.q}</p>
          <div class="space-y-2">${optionsHtml}</div>
          ${isAnswered ? `<div class="quiz-feedback">${item.explain}</div>` : ''}
        </div>
        <div class="mt-4 flex justify-end">
          <button onclick="nextQuizQuestion()" ${isAnswered ? '' : 'disabled'} class="action-btn ${isAnswered ? 'btn-primary' : 'btn-outline'}">${nextLabel}</button>
        </div>
      </div>`;
    }

    function answerQuiz(oi) {
      const state = quizStates[currentTopic];
      if (!state.answers) state.answers = {};
      if (state.currentIndex === undefined) state.currentIndex = 0;
      if (state.answers[state.currentIndex] !== undefined) return;
      state.answers[state.currentIndex] = oi;
      renderQuiz(document.getElementById('content-area'));
      lucide.createIcons();
    }

    function nextQuizQuestion() {
      const quiz = topics[currentTopic].quiz;
      const state = quizStates[currentTopic];
      if (!state.answers) state.answers = {};
      if (state.currentIndex === undefined) state.currentIndex = 0;
      if (state.answers[state.currentIndex] === undefined) return;
      if (state.currentIndex < quiz.length - 1) {
        state.currentIndex += 1;
      } else {
        state.finished = true;
      }
      renderQuiz(document.getElementById('content-area'));
      lucide.createIcons();
    }

    function resetQuiz() {

      renderQuiz(document.getElementById('content-area'));
      lucide.createIcons();
    }

    // ===== TOAST =====
    function showToast(msg) {

      document.body.appendChild(t);
      setTimeout(() => t.remove(), 2500);
    }

    const defaultConfig = {

            { get: () => config.text_color || defaultConfig.text_color, set: v => { config.text_color = v; window.elementSdk.setConfig({ text_color: v }); } },
            { get: () => config.primary_action || defaultConfig.primary_action, set: v => { config.primary_action = v; window.elementSdk.setConfig({ primary_action: v }); } },
            { get: () => config.secondary_action || defaultConfig.secondary_action, set: v => { config.secondary_action = v; window.elementSdk.setConfig({ secondary_action: v }); } }

          borderables: [],
          fontEditable: { get: () => config.font_family || defaultConfig.font_family, set: v => { config.font_family = v; window.elementSdk.setConfig({ font_family: v }); } },

        mapToEditPanelValues: (config) => new Map([

    function addFromSim() {
      if (!Number.isFinite(currentSimPoint.x) || !Number.isFinite(currentSimPoint.y)) {

      const x = currentSimPoint.x;
